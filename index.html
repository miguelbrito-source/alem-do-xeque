<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlémDoXeque | Core Intelligence v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="cyber-theme">

    <div class="overlay"></div>

    <header>
        <div class="header-container">
            <div class="header-decor-left">
                <i class="fas fa-chess-rook rook-icon"></i>
            </div>

            <div class="logo">
                <h1><i class="fas fa-chess-pawn pawn-logo"></i> ALÉM<span>DO</span>XEQUE</h1>
                <small>NEURAL ESTRATEGY // CORE_INT</small>
            </div>
            
            <div class="player-hud">
                <div class="stat-box">
                    <span class="label">RANK</span>
                    <strong id="patente"><i class="fas fa-chess-king king-rank"></i> PROTOCOLO MESTRE</strong>
                </div>
                <div class="stat-box">
                    <span class="label">ELO RATING</span>
                    <span id="elo" class="glow-text">1200</span>
                </div>
            </div>

            <div class="header-decor-right">
                <i class="fas fa-chess-queen queen-icon"></i>
            </div>
        </div>
    </header>

    <nav class="glass-nav">
        <ul class="menu-principal">
            <li><a href="#fundamentos"><i class="fas fa-microchip"></i> Fundamentos</a></li>
            <li><a href="#aberturas"><i class="fas fa-shield-halved"></i> Aberturas</a></li>
            <li><a href="#meio-jogo"><i class="fas fa-brain"></i> Meio-Jogo</a></li>
            <li><a href="#finais"><i class="fas fa-flag-checkered"></i> Finais</a></li>
        </ul>
    </nav>

    <main class="container">
        
        <section id="onboarding" class="glass-card scanner">
            <div class="card-header">
                <h2><i class="fas fa-user-plus"></i> INICIAR SINAPSE</h2>
            </div>
            <form id="form-onboarding" class="cyber-form">
                <div class="input-group">
                    <label for="nome">ID DO JOGADOR:</label>
                    <input type="text" id="nome" placeholder="Aguardando entrada..." required>
                </div>

                <div class="input-group">
                    <label for="nivel">NÍVEL DE ACESSO:</label>
                    <select id="nivel">
                        <option value="hobby">CIVIL (Hobby)</option>
                        <option value="competicao">MILITAR (Competição)</option>
                    </select>
                </div>

                <button type="submit" class="btn-neon">
                    <span>ESTABELECER CONEXÃO</span>
                </button>
            </form>
        </section>

        <div class="main-grid">
            <section id="tabuleiro-exploracao" class="glass-card">
                <h2><i class="fas fa-border-all"></i> ARENA VIRTUAL</h2>
                <div class="board-wrapper">
                    <div id="board">
                        <div class="scan-line"></div>
                    </div>
                </div>
            </section>

            <aside class="side-panel">
                <article id="puzzles-taticos" class="glass-card small">
                    <h2><i class="fas fa-puzzle-piece"></i> DATA PUZZLES</h2>
                    <p>Decifre o padrão para evoluir.</p>
                    <button id="dica-progressiva" class="btn-outline">SOLICITAR BYPASS</button>
                </article>

                <article id="aulas-video" class="glass-card small">
                    <h2><i class="fas fa-video"></i> NEURAL FEED</h2>
                    <div class="status-blink">
                        <span class="dot"></span> LIVE EXERCISES
                    </div>
                    <button id="btn-espiada" class="btn-outline">VER MEDALHAS</button>
                </article>
            </aside>
        </div>

    </main>

    <footer class="cyber-footer">
        <div class="footer-content">
            <p>SYSTEM STATUS: <span class="online">ONLINE</span> | &copy; 2026</p>
            <button id="ajuda-mestre" class="btn-ia-glow">
                <i class="fas fa-robot"></i> CONSULTAR ORÁCULO (IA)
            </button> 
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="db.js"></script>
    <script src="controller.js"></script>
</body>
</html>
