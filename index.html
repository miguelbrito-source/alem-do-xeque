<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlémDoXeque | Neural Core v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1><i class="fas fa-chess-pawn"></i> ALÉM<span>DO</span>XEQUE</h1>
        <p style="color: var(--text-secondary); font-size: 0.9rem;">Sincronizando estratégia neural...</p>
    </header>

    <nav>
        <ul>
            <li><a href="#fundamentos"><i class="fas fa-microchip"></i> FUNDAMENTOS</a></li>
            <li><a href="#aberturas"><i class="fas fa-shield-halved"></i> ABERTURAS</a></li>
            <li><a href="#meio-jogo"><i class="fas fa-brain"></i> NEURAL_GAME</a></li>
            <li><a href="#finais"><i class="fas fa-flag-checkered"></i> FINAIS</a></li>
        </ul>
    </nav>

    <main>

        <!-- ONBOARDING -->
        <section id="onboarding">
            <div class="card-header" style="margin-bottom: 1.5rem;">
                <h2><i class="fas fa-fingerprint"></i> ACESSO AO NÚCLEO</h2>
            </div>

            <form id="form-onboarding">
                <div class="input-group">
                    <label for="nome">ID_OPERADOR</label>
                    <input type="text" id="nome" placeholder="Digite seu nome..." required>
                </div>

                <div class="input-group">
                    <label for="nivel">CLEARANCE_LEVEL</label>
                    <select id="nivel">
                        <option value="hobby">ESTUDANTE (Civil)</option>
                        <option value="competicao">COMBATENTE (Elite)</option>
                    </select>
                </div>

                <button type="submit">
                    <i class="fas fa-bolt"></i> INICIAR SINAPSE
                </button>
            </form>
        </section>

        <!-- SISTEMA PRINCIPAL (oculto até login) -->
        <div class="main-grid">

            <section id="tabuleiro-exploracao">
                <h3><i class="fas fa-crosshairs"></i> VIRTUAL_ARENA_01</h3>
                <div id="board"></div>
            </section>

            <aside class="side-panel">
                <article id="puzzles-taticos">
                    <h2><i class="fas fa-puzzle-piece"></i> PUZZLES</h2>
                    <p style="color: var(--text-secondary); margin-bottom: 1rem;">Decifre os padrões do servidor.</p>
                    <button id="dica-progressiva" class="btn-outline-cyber">
                        <i class="fas fa-terminal"></i> SOLICITAR BYPASS
                    </button>
                </article>

                <article id="aulas-video">
                    <h2><i class="fas fa-video"></i> NEURAL FEED</h2>
                    <div class="status-blink" style="margin-bottom: 1rem;">
                        <span class="dot green"></span> EXERCÍCIOS ATIVOS
                    </div>
                    <button id="btn-espiada" class="btn-outline-cyber">
                        <i class="fas fa-satellite-dish"></i> ANALISAR POSIÇÃO
                    </button>
                </article>
            </aside>

        </div>

    </main>

    <footer>
        <div class="footer-content">
            <span style="font-size: 0.85rem;">CPU_LOAD: 24% | MEM: 1.2GB</span>
            <button id="ajuda-mestre">
                <i class="fas fa-robot"></i> CONSULTAR ORÁCULO_IA
            </button>
        </div>
    </footer>

    <!-- Scripts na ordem correta: dados → lógica → interface -->
    <script src="db.js"></script>
    <script src="controller.js"></script>
    <script src="script.js"></script>

</body>
</html>
